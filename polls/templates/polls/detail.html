{% extends "polls/base.html" %}

{% block content %}
<div class="poll-detail-container">
    <div class="poll-detail-card">
        <h1 class="question-header">{{ question.question_text }}</h1>

        {% if error_message %}
            <div class="error-message">
                <p><strong>⚠️ {{ error_message }}</strong></p>
            </div>
        {% endif %}

        <form action="{% url 'polls:vote' question.id %}" method="post" class="poll-form">
            {% csrf_token %}
            
            <div class="options-container">
                {% for choice in question.choice_set.all %}
                <label class="custom-radio-option" for="choice{{ forloop.counter }}">
                    <input type="radio" name="choice" id="choice{{ forloop.counter }}" value="{{ choice.id }}" class="hidden-radio">
                    <span class="radio-label-text">{{ choice.choice_text }}</span>
                    <span class="custom-radio-button"></span>
                </label>
                {% endfor %}
            </div>

            <div class="city-input-container" style="margin-top: 20px; margin-bottom: 20px;">
                <label for="city" style="display: block; margin-bottom: 8px; font-weight: bold;">Yaşadığınız Şehir:</label>
                <input type="text" name="city" id="city" placeholder="Örn: Ankara" required 
                       style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box;">
            </div>

            <button type="submit" class="btn-primary">Oy Ver 🚀</button>
        </form>
    </div>
</div>
{% endblock content %}
